<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Train Map (Hellenic Railways)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #f4f4f9; --header-bg: #004d99; --header-text: white; --sidebar-bg: white; --border-color: #ccc;
            --text-main: #333; --text-muted: #555; --item-hover: #f0f7ff; --accent-blue: #004d99; --box-bg: #eef2f5;
            --popup-bg: white; --map-filter: none; --dvr-bar-bg: #222;
            --train-size: 26px; --station-size: 8px;
        }
        body.dark-mode {
            --bg-color: #121212; --header-bg: #1a1a1a; --header-text: #e0e0e0; --sidebar-bg: #1e1e1e; --border-color: #333;
            --text-main: #e0e0e0; --text-muted: #aaa; --item-hover: #2c2c2c; --accent-blue: #66b3ff; --box-bg: #2a2a2a;
            --popup-bg: #242424; --map-filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); --dvr-bar-bg: #111;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); color: var(--text-main); overflow: hidden; transition: background-color 0.3s; }
        .header-container { display: flex; flex-direction: column; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        .top-header { background-color: var(--header-bg); color: var(--header-text); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .sidebar-toggle-btn { background: transparent; border: 1px solid rgba(255,255,255,0.5); color: white; font-size: 20px; cursor: pointer; padding: 4px 10px; border-radius: 4px; transition: 0.2s; }
        .sidebar-toggle-btn:hover { background: rgba(255,255,255,0.2); }
        
        h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        .controls-container { display: flex; align-items: center; gap: 15px; }
        .stats-bar { background-color: rgba(255, 255, 255, 0.15); padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .header-btn { background: #ff9800; border: none; color: white; padding: 6px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .theme-toggle { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: var(--header-text); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 10px; }

        .wayback-bar { background: var(--dvr-bar-bg); color: white; padding: 0 20px; display: flex; align-items: center; gap: 15px; font-family: monospace; transition: 0.3s; max-height: 0; overflow: hidden; opacity: 0; }
        .wayback-bar.active { max-height: 60px; padding: 10px 20px; opacity: 1; border-bottom: 2px solid var(--border-color); }
        .wayback-date-select { background: #333; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; outline: none; }
        .wayback-slider { flex-grow: 1; cursor: pointer; accent-color: #ff9800; }
        .wayback-time { font-size: 16px; font-weight: bold; min-width: 190px; text-align: center; color: #ff9800; }
        .live-btn { background: #d9534f; border: none; color: white; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .live-btn.active { background: #28a745; }

        .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; width: 100vw; position: relative; }
        
        #sidebar { width: 320px; min-width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 1000; transition: margin-left 0.3s ease; }
        #sidebar.collapsed { margin-left: -320px; }
        
        .sidebar-header { padding: 12px 15px; background: var(--box-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .view-select { padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border-color); font-weight: bold; color: var(--accent-blue); background: var(--sidebar-bg); cursor: pointer; outline: none; flex-grow: 1; margin-right: 10px; }
        .count-badge { background: var(--accent-blue); color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        
        #train-list { flex-grow: 1; overflow-y: auto; background: var(--bg-color); }
        .train-item { padding: 12px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; background: var(--sidebar-bg); transition: 0.2s; }
        .train-item:hover { background: var(--item-hover); border-left: 4px solid var(--accent-blue); }
        .train-item-title { font-weight: bold; color: var(--accent-blue); font-size: 14px; display: block; margin-bottom: 4px; }
        .train-item-meta { font-size: 12px; color: var(--text-muted); display: block; }
        .speed-badge { background-color: #d9534f; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; float: right; }
        .speed-badge.green { background-color: #28a745; }
        
        #map { flex-grow: 1; height: 100%; z-index: 1; background-color: #aaa; }
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution { filter: var(--map-filter); transition: 0.3s; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background-color: var(--popup-bg); color: var(--text-main); }
        
        .train-icon-container { background: transparent; border: none; }
        .train-arrow { 
            background-color: #d9534f; color: white; border: 2px solid white; border-radius: 50%; 
            width: var(--train-size); height: var(--train-size); 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.6); font-size: calc(var(--train-size) * 0.5);
            transition: transform 0.5s ease-out, background-color 0.5s ease, width 0.3s, height 0.3s;
        }

        .leaflet-marker-pane .train-icon-container { transition: transform 1.0s linear; }
        .leaflet-zoom-anim .leaflet-marker-pane .train-icon-container { transition: none; }

        .info-popup { font-size: 13px; line-height: 1.4; max-height: 400px; overflow-y: auto; }
        .info-popup b { color: var(--accent-blue); }
        .info-popup hr { border: 0; border-top: 1px solid var(--border-color); margin: 8px 0; }
        .details-box { background-color: var(--box-bg); border: 1px solid var(--border-color); border-radius: 4px; padding: 8px; font-size: 11px; margin-top: 10px; overflow-y: auto; max-height: 150px; color: var(--text-muted); }
        .details-box b { color: var(--text-main); }
        .train-stats { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .train-stats td { padding: 3px 0; vertical-align: top; }
        .train-stats td:first-child { width: 90px; }
        .cam-btn { display: block; width: 100%; margin-top: 10px; padding: 8px; background-color: #d9534f; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-align: center; transition: 0.2s; }

        /* Stream URL Container Styling */
        .stream-url-container { margin-top: 8px; padding: 8px; background: var(--box-bg); border: 1px solid var(--border-color); border-radius: 4px; font-family: monospace; font-size: 11px; word-break: break-all; }
        .copy-url-btn { float: right; background: var(--accent-blue); color: white; border: none; border-radius: 3px; padding: 3px 8px; cursor: pointer; font-weight: bold; font-family: sans-serif; }
        .copy-url-btn:hover { opacity: 0.8; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.8); z-index: 3000; }
        .modal-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 800px; background: #000; border-radius: 8px; overflow: hidden; }
        .modal-header { background: #222; color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .close-modal { background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; }
        video { width: 100%; max-height: 70vh; outline: none; background-color: black; }
    </style>
</head>
<body>

    <div class="header-container">
        <header class="top-header">
            <div class="header-left">
                <button class="sidebar-toggle-btn" onclick="toggleSidebar()">☰</button>
                <h1>Hellenic Railways Live</h1>
            </div>
            <div class="controls-container">
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Dark Mode</button>
                <button class="header-btn" onclick="toggleWaybackUI()">⏳ DVR Mode</button>
                <div class="stats-bar">
                    🚂 Mode: <span id="map-mode-indicator" style="color:#28a745;">LIVE</span> | ⚡ MPS: <span id="mps-counter">0</span> | <span id="stream-status">🟡 Connecting...</span>
                </div>
            </div>
        </header>

        <div id="wayback-bar" class="wayback-bar">
            <button id="wayback-live-btn" class="live-btn active" onclick="goLive()">🔴 LIVE</button>
            <select id="dvr-date-select" class="wayback-date-select" onchange="loadArchiveDate(this.value)"></select>
            <input type="range" id="wayback-slider" class="wayback-slider" value="0" step="1" oninput="scrubWayback()">
            <div id="wayback-time-display" class="wayback-time">LIVE</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="sidebar">
            <div class="sidebar-header">
                <select id="sidebar-view" class="view-select" onchange="changeSidebarView(this.value)">
                    <option value="live">📍 Live Map Trains</option>
                    <option value="active">🚀 Active (>1km/h)</option>
                    <option value="all">📡 All Known Trains</option>
                </select>
                <span class="count-badge" id="sidebar-count">0</span>
            </div>
            <div id="train-list"><div style="padding: 15px; color: var(--text-muted); text-align: center;">Loading data...</div></div>
        </div>
        <div id="map"></div>
    </div>

    <div id="video-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <span id="video-title">Train Dashcam</span>
                <button class="close-modal" onclick="closeDashcam()">✖</button>
            </div>
            <video id="dashcam-player" controls autoplay></video>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        // --- 1. GLOBAL STATE ---
        let latestLiveData = [];
        let latestTrackerData = [];
        let currentSidebarView = 'live';
        let isWaybackMode = false;
        let waybackTargetTime = 0;
        let currentArchiveData = {};
        
        const trainMarkers = {};
        const stationMarkers = [];
        let hlsPlayer = null;
        const lastTrainTimestamps = {};

        function extractLocoId(t) { return t.locomotiveId || t.trainId || t._id || t.id; }
        
        function extractLocoNum(t) { return t.locomotiveNumber || "Unknown Loco"; }
        
        function extractRouteName(t) { 
            const name = t.name || t.trainName || "";
            const num = t.trainNumber || t.scheduleNumber || "";
            if (name && num && name !== num) return `${name} (${num})`;
            return name || num || 'No Route Assigned';
        }

        // --- 2. UI SETUP ---
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-btn').innerText = isDark ? '☀ Light Mode' : '🌙 Dark Mode';
        }
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-btn').innerText = '☀ Light Mode';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // --- 3. MAP SETUP ---
        const map = L.map('map').setView([39.0, 22.5], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        map.createPane('infraPane'); map.getPane('infraPane').style.zIndex = 400;
        map.createPane('stationsPane'); map.getPane('stationsPane').style.zIndex = 450;

        function updateScaling() {
            const zoom = map.getZoom();
            const trainSize = Math.max(14, Math.min(30, zoom * 3)); 
            const stationSize = Math.max(3, Math.min(10, zoom - 4));
            document.documentElement.style.setProperty('--train-size', trainSize + 'px');
            stationMarkers.forEach(m => m.setRadius(stationSize));
        }
        map.on('zoomend', updateScaling);

        function formatTimeAgo(sec) {
            if (sec < 60) return Math.floor(sec) + 's ago';
            const m = Math.floor(sec / 60);
            if (m < 60) return m + 'm ' + Math.floor(sec % 60) + 's ago';
            const h = Math.floor(m / 60);
            return h + 'h ' + (m % 60) + 'm ago';
        }

        window.focusTrain = (id) => { 
            if(trainMarkers[id]) {
                map.flyTo(trainMarkers[id].getLatLng(), 15);
                setTimeout(() => { trainMarkers[id].openPopup(); }, 500);
            } 
        };

        // --- 4. CORE RENDERING ENGINE ---
        function renderSidebar() {
            const listEl = document.getElementById('train-list');
            const countEl = document.getElementById('sidebar-count');
            const listScroll = listEl.scrollTop;
            let dataToRender = [];

            if (isWaybackMode) {
                if (currentSidebarView === 'dvr-active') {
                    dataToRender = Object.values(currentArchiveData).filter(t => {
                        let speed = 0;
                        for (let i = 0; i < t.path_history.length - 1; i++) {
                            if (waybackTargetTime >= t.path_history[i].t && waybackTargetTime <= t.path_history[i+1].t) {
                                speed = t.path_history[i].s; break;
                            }
                        }
                        return speed > 1.0;
                    });
                } else { dataToRender = Object.values(currentArchiveData); }
            } else {
                if (currentSidebarView === 'live') dataToRender = latestLiveData;
                else if (currentSidebarView === 'active') dataToRender = latestTrackerData.filter(t => t.current_speed > 1.0);
                else dataToRender = latestTrackerData;
            }

            countEl.innerText = dataToRender.length;
            const existingIds = new Set();
            
            dataToRender.forEach(train => {
                const raw = train.raw_data || train;
                const locoId = extractLocoId(raw);
                if (!locoId) return;
                existingIds.add(locoId);
                
                let item = document.getElementById('item-' + locoId);
                
                const locoNum = train.loco_num || extractLocoNum(raw);
                const routeName = train.route_name || extractRouteName(raw);
                const speedVal = train.current_speed !== undefined ? train.current_speed : (train.speed !== undefined ? train.speed : 0);
                const speed = parseFloat(speedVal).toFixed(1);
                
                const dot = speedVal > 1.0 ? '🟢' : (isWaybackMode ? '📡' : '🟡');
                const speedClass = speedVal > 1.0 ? 'speed-badge green' : 'speed-badge';

                const schedId = raw.trainId || raw.scheduleId;
                let idMeta = `Loco: ${locoId}`;
                if (schedId && schedId !== locoId) {
                    idMeta += ` | Sched: ${schedId}`;
                }

                const content = `
                    <span class="train-item-title">${dot} Loco: ${locoNum} <span class="${speedClass}">${speed} km/h</span></span>
                    <span class="train-item-meta">Route: ${routeName}</span>
                    <span class="train-item-meta" style="font-size:10px; margin-top:4px; font-family:monospace;">${idMeta}</span>
                `;
                
                if (item) {
                    if (item.innerHTML !== content) item.innerHTML = content;
                } else {
                    const div = document.createElement('div');
                    div.id = 'item-' + locoId;
                    div.className = 'train-item';
                    div.onclick = () => focusTrain(locoId);
                    div.innerHTML = content;
                    listEl.appendChild(div);
                }
            });

            Array.from(listEl.children).forEach(child => {
                const childId = child.id.replace('item-', '');
                if (!existingIds.has(childId)) listEl.removeChild(child);
            });
        }

        function updateMapMarker(trainData, mode, lastSeenSec) {
            const locoId = extractLocoId(trainData);
            const trainId = trainData.trainId || trainData._id || trainData.id; 
            const lat = trainData.lat; const lng = trainData.lng;
            if (!lat || !lng || !locoId) return;

            const msgTime = new Date(trainData.timestamp || trainData.receivedAt || 0).getTime();
            if (msgTime && mode === 'live') {
                if (lastTrainTimestamps[locoId] && msgTime < lastTrainTimestamps[locoId]) return;
                lastTrainTimestamps[locoId] = msgTime;
            }

            const locoNum = extractLocoNum(trainData);
            const routeName = extractRouteName(trainData);
            const heading = trainData.course || 0;
            const speedText = parseFloat(trainData.speed || 0).toFixed(1) + ' km/h';
            const headingText = trainData.course ? Math.round(trainData.course) + '°' : 'N/A';
            const nextStop = trainData.next_stop || trainData.nextStation || trainData.nextStopName || trainData.destination || 'Not available';

            let markerColor = '#d9534f'; 
            let statusText = `<span style="color:#28a745;font-weight:bold;">🟢 Live Streaming</span>`;
            
            if (mode === 'wayback') {
                markerColor = '#ff9800'; 
                statusText = `<span style="color:#ff9800;font-weight:bold;">🕒 DVR Playback (${new Date(waybackTargetTime * 1000).toLocaleTimeString()})</span>`;
            } else if (mode === 'ghost') {
                markerColor = '#777777'; 
                statusText = `<span style="color:#d9534f;font-weight:bold;">📡 Last seen ${formatTimeAgo(lastSeenSec)}</span>`;
            }

            let lostSignalRow = (mode === 'ghost' && lastSeenSec > 120) ? `<tr><td><b>Lost Signal:</b></td><td style="color:#d9534f; font-weight:bold;">${new Date(Date.now() - (lastSeenSec * 1000)).toLocaleTimeString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</td></tr>` : '';

            // Inject the Stream-Info container which will be populated dynamically on click
            let innerContentHtml = `
                <div style="font-size:16px; margin-bottom: 5px; color:${markerColor};"><b>🚂 Loco: ${locoNum}</b></div>
                <div style="font-size:14px; margin-bottom: 5px;"><b>Route:</b> ${routeName}</div>
                <div style="margin-bottom: 8px;">${statusText}</div>
                <table class="train-stats">
                    <tr><td><b>Loco ID:</b></td><td>${locoId}</td></tr>
                    <tr><td><b>Speed:</b></td><td><span id="pop-speed-${locoId}">${speedText}</span></td></tr>
                    <tr><td><b>Heading:</b></td><td>${headingText}</td></tr>
                    <tr><td><b>Next Stop:</b></td><td>${nextStop}</td></tr>
                    ${lostSignalRow}
                </table>
                <button id="cam-btn-${locoId}" class="cam-btn" style="background-color:${markerColor};" onclick="openDashcam('${locoId}', '${trainId}', '${locoNum}')">🎥 Live Dashcam</button>
                <div id="stream-info-${locoId}" class="stream-url-container" style="display:none;"></div>
                <div class="details-box"><b>All Details:</b><br>
            `;
            for (const [key, value] of Object.entries(trainData)) {
                if(key !== "path_history") innerContentHtml += `<b>${key}:</b> ${typeof value === 'object' ? JSON.stringify(value) : value}<br>`;
            }
            innerContentHtml += `</div>`;

            if (trainMarkers[locoId]) {
                const m = trainMarkers[locoId];
                m.setLatLng([lat, lng]); 
                
                const arrow = m.getElement().querySelector('.train-arrow');
                if (arrow) {
                    arrow.style.transform = `rotate(${heading}deg)`;
                    arrow.style.backgroundColor = markerColor; 
                }
                if (m.getPopup() && m.getPopup().isOpen()) {
                    const el = document.getElementById('pop-speed-' + locoId);
                    if (el) el.innerText = speedText;
                }
            } else {
                const icon = L.divIcon({
                    className: 'train-icon-container',
                    html: `<div class="train-arrow" style="transform: rotate(${heading}deg); background-color:${markerColor}">▲</div>`,
                    iconSize: [30, 30], iconAnchor: [15, 15]
                });
                const m = L.marker([lat, lng], { icon }).addTo(map);
                m.bindPopup(`<div class="info-popup" id="train-data-${locoId}">${innerContentHtml}</div>`, { maxHeight: 380, minWidth: 250, autoPan: false });
                
                // EVENT LISTENER: Fetch stream URL specifically when the user clicks the marker
                m.on('popupopen', () => {
                    if (isWaybackMode) return;
                    const container = document.getElementById(`stream-info-${locoId}`);
                    if (!container || container.dataset.loaded) return; 
                    
                    container.style.display = 'block';
                    container.innerHTML = '<i>Fetching stream URL...</i>';
                    
                    fetch(`/api/public/trains/${locoId}/stream?tid=${trainId}`)
                        .then(r => r.json())
                        .then(data => {
                            const url = data.hls?.playlistUrl;
                            if (url) {
                                container.innerHTML = `
                                    <button class="copy-url-btn" onclick="navigator.clipboard.writeText('${url}').then(()=>this.innerText='Copied!')">📋 Copy URL</button>
                                    <b>HLS Stream:</b><br><span style="user-select:all; color: var(--text-muted);">${url}</span>
                                    <div style="clear:both;"></div>
                                `;
                            } else {
                                container.innerHTML = '<i>No stream available.</i>';
                            }
                            container.dataset.loaded = "true";
                        })
                        .catch(() => {
                            container.innerHTML = '<i>Failed to fetch stream URL.</i>';
                        });
                });

                trainMarkers[locoId] = m;
            }
        }

        // --- 5. DATA FETCHING ---
        function fetchTrackerData() {
            if (isWaybackMode) return;
            fetch('/api/tracker')
                .then(r => r.json())
                .then(data => {
                    latestTrackerData = data;
                    if (currentSidebarView !== 'live') renderSidebar();
                    data.forEach(t => {
                        const isLive = latestLiveData.some(l => extractLocoId(l) === t.id);
                        if (!isLive && t.last_seen_sec > 120 && t.raw_data && t.lat && t.lng) {
                            updateMapMarker(t.raw_data, 'ghost', t.last_seen_sec);
                        }
                    });
                }).catch(err => console.log("Tracker API offline."));
        }

        function init() {
            fetchTrackerData();
            setInterval(fetchTrackerData, 3000);

            const source = new EventSource('/train-stream');
            source.addEventListener('trainPositionsUx', (e) => {
                if (isWaybackMode) return;
                try {
                    latestLiveData = JSON.parse(e.data).positions || [];
                    if (currentSidebarView === 'live') renderSidebar();
                    latestLiveData.forEach(train => updateMapMarker(train, 'live', 0));
                } catch(err) {}
            });
            source.addEventListener('server_stats', (e) => { 
                document.getElementById('mps-counter').innerText = e.data; 
                document.getElementById('stream-status').innerText = '🟢 Connected';
            });
            source.onerror = () => { document.getElementById('stream-status').innerText = '🔴 Offline'; };

            fetch('/geo').then(r=>r.json()).then(j=>{
                if(j&&j.data)L.geoJSON(j.data,{
                    pointToLayer:(f,ll)=>{
                        const m = L.circleMarker(ll,{pane:'stationsPane',radius:8,fillColor:"#ff7800",color:"#000",weight:1,fillOpacity:0.8});
                        stationMarkers.push(m); return m;
                    },
                    style: function(feature) {
                        if (feature.properties.entityType === 'tunnel') return { color: "#555", weight: 6, dashArray: "6, 6", pane: "infraPane" };
                        else if (feature.properties.entityType === 'track') return { color: "#3388ff", weight: 5, opacity: 0.7, pane: "infraPane" };
                    },
                    onEachFeature: function (feature, layer) {
                        const name = feature.properties.name || feature.properties.entityType.toUpperCase();
                        const stationId = feature.properties._id || feature.properties.osm_id;
                        let popupHtml = `<div class="info-popup"><b style="font-size: 16px;">🏢 ${name}</b><hr><div id="board-${stationId}"></div><div class="details-box"><b>Details:</b><br>`;
                        for (const [key, value] of Object.entries(feature.properties)) popupHtml += `<b>${key}:</b> ${value}<br>`;
                        popupHtml += `</div></div>`;
                        
                        layer.bindPopup(popupHtml, { maxHeight: 450, minWidth: 420, autoPan: false });

                        layer.on('popupopen', function() {
                            if (feature.properties.entityType === 'station' && stationId) {
                                const container = document.getElementById(`board-${stationId}`);
                                if (!container) return;
                                container.innerHTML = '<i>Fetching live boards...</i><br><br>';
                                Promise.all([
                                    fetch(`/arrivals/${stationId}`).then(res => res.json()),
                                    fetch(`/departures/${stationId}`).then(res => res.json())
                                ]).then(([arrData, depData]) => {
                                    let boardHtml = '<div style="display:flex;gap:15px;"><div style="flex:1;"><b>📥 ARRIVALS:</b><ul style="margin:5px 0 0 0;padding:5px 10px 5px 25px;background:#fff;border:1px solid #ddd;border-radius:4px;max-height:150px;overflow-y:auto;color:#333;">';
                                    if (arrData && arrData.arrivals && arrData.arrivals.length > 0) {
                                        arrData.arrivals.forEach(arr => {
                                            const time = new Date(arr.scheduledTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                                            boardHtml += `<li style="margin-bottom:6px;border-bottom:1px dotted #ccc;"><span style="color:#d9534f;font-weight:bold;">${time}</span><br>Trn <b>${arr.trainNumber}</b> from ${arr.from}</li>`;
                                        });
                                    } else { boardHtml += '<li><i>No arrivals</i></li>'; }
                                    
                                    boardHtml += '</ul></div><div style="flex:1;"><b>📤 DEPARTURES:</b><ul style="margin:5px 0 0 0;padding:5px 10px 5px 25px;background:#fff;border:1px solid #ddd;border-radius:4px;max-height:150px;overflow-y:auto;color:#333;">';
                                    if (depData && depData.departures && depData.departures.length > 0) {
                                        depData.departures.forEach(dep => {
                                            const time = new Date(dep.scheduledTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                                            boardHtml += `<li style="margin-bottom:6px;border-bottom:1px dotted #ccc;"><span style="color:#28a745;font-weight:bold;">${time}</span><br>Trn <b>${dep.trainNumber}</b> to ${dep.to}</li>`;
                                        });
                                    } else { boardHtml += '<li><i>No departures</i></li>'; }
                                    boardHtml += '</ul></div></div>';
                                    container.innerHTML = boardHtml;
                                }).catch(err => { if (container) container.innerHTML = '<i>Error loading boards.</i>'; });
                            }
                        });
                    }
                }).addTo(map);
                updateScaling();
            });
        }

        // --- 6. DVR ACTIONS ---
        window.changeSidebarView = (v) => { currentSidebarView = v; renderSidebar(); };

        window.toggleWaybackUI = function() {
            const bar = document.getElementById('wayback-bar');
            const isActive = bar.classList.toggle('active');
            if (isActive) {
                fetch('/api/archives/list').then(r=>r.json()).then(dates => {
                    const sel = document.getElementById('dvr-date-select');
                    sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
                    loadArchiveDate(dates[0]);
                });
            } else { goLive(); }
        };

        window.loadArchiveDate = function(d) {
            fetch(`/api/archives/${d}`).then(r=>r.json()).then(data => {
                currentArchiveData = data;
                isWaybackMode = true;
                document.getElementById('map-mode-indicator').innerText = "DVR MODE";
                document.getElementById('map-mode-indicator').style.color = "#ff9800";
                document.getElementById('sidebar-view').innerHTML = `
                    <option value="dvr-all">📡 DVR: All Trains</option>
                    <option value="dvr-active">🚀 DVR: Moving Only</option>
                `;
                currentSidebarView = 'dvr-all';

                let minT = Infinity, maxT = 0;
                Object.values(data).forEach(t => {
                    if (t.path_history.length) {
                        minT = Math.min(minT, t.path_history[0].t);
                        maxT = Math.max(maxT, t.path_history[t.path_history.length-1].t);
                    }
                });
                
                const s = document.getElementById('wayback-slider');
                if (minT === Infinity) { s.min = 0; s.max = 0; s.value = 0; return; }
                s.min = minT; s.max = maxT; 
                s.value = (d === new Date().toISOString().split('T')[0]) ? Math.floor(Date.now() / 1000) : maxT;
                scrubWayback();
            });
        };

        let isScrubbing = false;
        document.getElementById('wayback-slider').addEventListener('mousedown', () => isScrubbing = true);
        document.getElementById('wayback-slider').addEventListener('mouseup', () => isScrubbing = false);
        document.getElementById('wayback-slider').addEventListener('touchstart', () => isScrubbing = true);
        document.getElementById('wayback-slider').addEventListener('touchend', () => isScrubbing = false);

        window.scrubWayback = function() {
            waybackTargetTime = parseInt(document.getElementById('wayback-slider').value);
            document.getElementById('wayback-time-display').innerText = new Date(waybackTargetTime*1000).toLocaleTimeString();
            drawWaybackMap();
            renderSidebar();
        };

        function drawWaybackMap() {
            for (let id in trainMarkers) { map.removeLayer(trainMarkers[id]); delete trainMarkers[id]; }
            Object.values(currentArchiveData).forEach(t => {
                if (!t.path_history.length) return;
                
                let bestP = null;
                if (waybackTargetTime <= t.path_history[0].t) {
                    bestP = t.path_history[0];
                } else if (waybackTargetTime >= t.path_history[t.path_history.length - 1].t) {
                    bestP = t.path_history[t.path_history.length - 1];
                } else {
                    for (let i = 0; i < t.path_history.length - 1; i++) {
                        if (waybackTargetTime >= t.path_history[i].t && waybackTargetTime <= t.path_history[i+1].t) {
                            bestP = t.path_history[i]; break;
                        }
                    }
                }
                
                if (bestP && t.raw_data) {
                    const fake = {...t.raw_data, lat: bestP.lat, lng: bestP.lng, speed: bestP.s, course: bestP.h};
                    fake.locomotiveId = t.raw_data.locomotiveId || t.raw_data.trainId || t.raw_data._id || t.id; 
                    
                    const ageInPast = Math.max(0, waybackTargetTime - bestP.t);
                    if (ageInPast > 120) updateMapMarker(fake, 'ghost', ageInPast);
                    else updateMapMarker(fake, 'wayback', 0);
                }
            });
        }

        window.goLive = () => location.reload();

        // --- 7. DASHCAM ---
        window.openDashcam = function(locoId, trainId, locoNum) {
            if (isWaybackMode) { alert("Dashcam feed unavailable in DVR mode."); return; }
            const btn = document.getElementById(`cam-btn-${locoId}`);
            if(btn) btn.innerText = "⏳ Loading...";

            fetch(`/api/public/trains/${locoId}/stream?tid=${trainId}`)
                .then(res => res.json())
                .then(data => {
                    if(btn) btn.innerText = "🎥 Live Dashcam";
                    const streamUrl = data.hls?.playlistUrl;
                    if (!streamUrl) { alert("No stream available."); return; }
                    
                    document.getElementById('video-title').innerText = `🚂 Live Dashcam: Loco ${locoNum}`;
                    document.getElementById('video-modal').style.display = 'block';
                    const videoElement = document.getElementById('dashcam-player');
                    
                    if (Hls.isSupported()) {
                        if (hlsPlayer) hlsPlayer.destroy();
                        hlsPlayer = new Hls({ liveSyncDurationCount: 3, liveMaxLatencyDurationCount: 5, enableWorker: true });
                        hlsPlayer.loadSource(streamUrl);
                        hlsPlayer.attachMedia(videoElement);
                        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => videoElement.play());
                    } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                        videoElement.src = streamUrl;
                        videoElement.addEventListener('loadedmetadata', () => videoElement.play());
                    }
                })
                .catch(() => { if(btn) btn.innerText = "🎥 Live Dashcam"; alert("Error reaching stream server."); });
        };

        window.closeDashcam = function() {
            document.getElementById('video-modal').style.display = 'none';
            const v = document.getElementById('dashcam-player');
            v.pause(); if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        };

        init();
    </script>
</body>
</html>
