<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Train Map (Hellenic Railways)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #f4f4f9; --header-bg: #004d99; --header-text: white; --sidebar-bg: white; --border-color: #ccc;
            --text-main: #333; --text-muted: #555; --item-hover: #f0f7ff; --accent-blue: #004d99; --box-bg: #eef2f5;
            --popup-bg: white; --map-filter: none; --dvr-bar-bg: #222;
        }
        body.dark-mode {
            --bg-color: #121212; --header-bg: #1a1a1a; --header-text: #e0e0e0; --sidebar-bg: #1e1e1e; --border-color: #333;
            --text-main: #e0e0e0; --text-muted: #aaa; --item-hover: #2c2c2c; --accent-blue: #66b3ff; --box-bg: #2a2a2a;
            --popup-bg: #242424; --map-filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); --dvr-bar-bg: #111;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); color: var(--text-main); overflow: hidden; transition: 0.3s; }
        .header-container { display: flex; flex-direction: column; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        .top-header { background-color: var(--header-bg); color: var(--header-text); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        .controls-container { display: flex; align-items: center; gap: 15px; }
        .stats-bar { background-color: rgba(255, 255, 255, 0.15); padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .header-btn { background: #ff9800; border: none; color: white; padding: 6px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .theme-toggle { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: var(--header-text); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; }

        /* THE WAYBACK BAR */
        .wayback-bar { background: var(--dvr-bar-bg); color: white; padding: 0 20px; display: flex; align-items: center; gap: 15px; font-family: monospace; transition: 0.3s; max-height: 0; overflow: hidden; opacity: 0; border: none; }
        .wayback-bar.active { max-height: 60px; padding: 10px 20px; opacity: 1; border-bottom: 2px solid var(--border-color); }
        .wayback-date-select { background: #333; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; font-family: monospace; font-weight: bold; outline: none; }
        .wayback-slider { flex-grow: 1; cursor: pointer; accent-color: #ff9800; }
        .wayback-time { font-size: 16px; font-weight: bold; min-width: 190px; text-align: center; color: #ff9800; }
        .live-btn { background: #d9534f; border: none; color: white; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .live-btn.active { background: #28a745; }

        .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; width: 100vw; position: relative; }
        #sidebar { width: 320px; min-width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 1000; }
        .sidebar-header { padding: 12px 15px; background: var(--box-bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .view-select { padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border-color); font-weight: bold; color: var(--accent-blue); font-size: 14px; background: var(--sidebar-bg); cursor: pointer; outline: none; flex-grow: 1; margin-right: 10px; }
        .count-badge { background: var(--accent-blue); color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        
        #train-list { flex-grow: 1; overflow-y: auto; background: var(--bg-color); }
        .train-item { padding: 12px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; background: var(--sidebar-bg); }
        .train-item:hover { background: var(--item-hover); border-left: 4px solid var(--accent-blue); padding-left: 11px; }
        .train-item-title { font-weight: bold; color: var(--accent-blue); font-size: 14px; display: flex; justify-content: space-between; margin-bottom: 6px; }
        .train-item-meta { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 2px; }
        .speed-badge { background-color: #d9534f; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .speed-badge.green { background-color: #28a745; }
        
        #map { flex-grow: 1; height: 100%; z-index: 1; background-color: #aaa; }
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution { filter: var(--map-filter); transition: 0.3s; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background-color: var(--popup-bg); color: var(--text-main); }
        
        .info-popup { font-size: 13px; line-height: 1.5; }
        .info-popup b { color: var(--accent-blue); }
        .info-popup hr { border: 0; border-top: 1px solid var(--border-color); margin: 8px 0; }
        .details-box { background-color: var(--box-bg); border: 1px solid var(--border-color); border-radius: 4px; padding: 8px; font-size: 11px; color: var(--text-muted); max-height: 120px; overflow-y: auto; margin-top: 10px; }
        .details-box b { color: var(--text-main); }
        .train-icon-container { background: transparent; border: none; }
        .train-arrow { background-color: #d9534f; color: white; border: 2px solid white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.6); transition: transform 0.5s ease-out, background-color 0.5s ease; font-size: 12px; }
        .train-stats { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .train-stats td { padding: 3px 0; vertical-align: top; }
        .train-stats td:first-child { width: 90px; }
        .cam-btn { display: block; width: 100%; margin-top: 10px; padding: 8px; background-color: #d9534f; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-align: center; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.8); z-index: 3000; }
        .modal-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 800px; background: #000; border-radius: 8px; overflow: hidden; }
        .modal-header { background: #222; color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .close-modal { background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; }
        video { width: 100%; max-height: 70vh; outline: none; background-color: black; }
    </style>
</head>
<body>

    <div class="header-container">
        <header class="top-header">
            <h1>Hellenic Railways Live</h1>
            <div class="controls-container">
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Dark Mode</button>
                <button class="header-btn" onclick="toggleWaybackUI()">⏳ DVR Mode</button>
                <div class="stats-bar">
                    🚂 Map Mode: <span id="map-mode-indicator" style="color:#28a745;">LIVE</span> | ⚡ MPS: <span id="mps-counter">0</span> | Status: <span id="stream-status">🟡 Connecting...</span>
                </div>
            </div>
        </header>

        <div id="wayback-bar" class="wayback-bar">
            <button id="wayback-live-btn" class="live-btn active" onclick="goLive()">🔴 LIVE</button>
            <select id="dvr-date-select" class="wayback-date-select" onchange="loadArchiveDate(this.value)">
                <option value="">Loading Dates...</option>
            </select>
            <input type="range" id="wayback-slider" class="wayback-slider" value="0" step="1" oninput="scrubWayback()">
            <div id="wayback-time-display" class="wayback-time">LIVE</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="sidebar">
            <div class="sidebar-header">
                <select id="sidebar-view" class="view-select" onchange="changeSidebarView(this.value)">
                    </select>
                <span class="count-badge" id="sidebar-count">0</span>
            </div>
            <div id="train-list"><div style="padding: 15px; color: var(--text-muted); font-size: 13px;">Waiting for train data...</div></div>
        </div>
        <div id="map"></div>
    </div>

    <div id="video-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <span id="video-title">Train Dashcam</span>
                <button class="close-modal" onclick="closeDashcam()">✖</button>
            </div>
            <video id="dashcam-player" controls autoplay></video>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        let latestLiveData = [];      // Current SSE positions
let latestTrackerData = [];   // Snapshot from the Python DB
let currentSidebarView = 'live'; // Default dropdown state
let isWaybackMode = false;    // Toggle for DVR
let waybackTargetTime = 0;    // The "Time Travel" timestamp
let currentArchiveData = {};  // The full-day dataset for DVR
const trainMarkers = {};      // Leaflet marker objects (keyed by ID)
const stationMarkers = [];    // Array of circle markers for scaling
        // THEME LOGIC
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-btn').innerText = '☀ Light Mode';
            }
        }
        window.toggleTheme = function() {
            const isDark = document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('theme-btn');
            if (isDark) { localStorage.setItem('theme', 'dark'); btn.innerText = '☀ Light Mode'; } 
            else { localStorage.setItem('theme', 'light'); btn.innerText = '🌙 Dark Mode'; }
        };
        initTheme();

        const map = L.map('map').setView([39.0, 22.5], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
        map.createPane('stationsPane'); map.getPane('stationsPane').style.zIndex = 450;
        const trainMarkers = {};

        function formatTimeAgo(sec) {
            if (sec < 60) return Math.floor(sec) + 's ago';
            const m = Math.floor(sec / 60);
            if (m < 60) return m + 'm ' + Math.floor(sec % 60) + 's ago';
            const h = Math.floor(m / 60);
            const d = Math.floor(h / 24);
            if (d > 0) return d + 'd ' + (h % 24) + 'h ago';
            return h + 'h ' + (m % 60) + 'm ago';
        }

        window.focusTrain = function(trainId) {
            const marker = trainMarkers[trainId];
            if (marker) {
                map.flyTo(marker.getLatLng(), 14, { duration: 1.5 });
                setTimeout(() => { marker.openPopup(); }, 500);
            } else { alert("Location coordinates for this train are not available."); }
        };

        // ==========================================
        // DVR (WAYBACK) LOGIC
        // ==========================================
        let isWaybackMode = false;
        let waybackTargetTime = 0; 
        let currentArchiveData = {}; 

        window.toggleWaybackUI = function() {
            const bar = document.getElementById('wayback-bar');
            bar.classList.toggle('active');
            
            if (bar.classList.contains('active')) {
                // Fetch available dates when opening
                fetch('/api/archives/list').then(r=>r.json()).then(dates => {
                    const sel = document.getElementById('dvr-date-select');
                    sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
                    if(dates.length > 0 && !isWaybackMode) {
                        loadArchiveDate(dates[0]); // Load the newest day by default
                    }
                });
            } else {
                goLive();
            }
        };

        window.loadArchiveDate = function(dateStr) {
            document.getElementById('wayback-time-display').innerText = "Downloading dataset...";
            
            fetch(`/api/archives/${dateStr}`)
                .then(r=>r.json())
                .then(data => {
                    currentArchiveData = data;
                    setupDVREnvironment(dateStr);
                })
                .catch(err => {
                    document.getElementById('wayback-time-display').innerText = "Download Error";
                });
        };

        function setupDVREnvironment(dateStr) {
            isWaybackMode = true;
            document.getElementById('wayback-live-btn').classList.remove('active');
            document.getElementById('wayback-live-btn').innerText = "Resume Live";
            
            const modeInd = document.getElementById('map-mode-indicator');
            modeInd.innerText = "DVR PLAYBACK";
            modeInd.style.color = "#ff9800";

            // Update Sidebar dropdown to DVR modes
            document.getElementById('sidebar-view').innerHTML = `
                <option value="dvr-all">📡 DVR: All Trains in Dataset</option>
                <option value="dvr-active">🚀 DVR: Moving at timestamp</option>
            `;
            currentSidebarView = 'dvr-all';

            // Find Min and Max timestamps in the dataset
            let minTime = Infinity;
            let maxTime = 0;
            
            Object.values(currentArchiveData).forEach(t => {
                if (t.path_history && t.path_history.length > 0) {
                    minTime = Math.min(minTime, t.path_history[0].t);
                    maxTime = Math.max(maxTime, t.path_history[t.path_history.length - 1].t);
                }
            });

            const slider = document.getElementById('wayback-slider');
            
            if (minTime === Infinity) {
                // Empty dataset
                slider.min = 0; slider.max = 0; slider.value = 0;
                document.getElementById('wayback-time-display').innerText = "No Data";
                renderSidebar();
                return;
            }

            slider.min = Math.floor(minTime);
            slider.max = Math.ceil(maxTime);
            
            // If it's today's date, start the scrubber at "Right Now". Otherwise, start at the end of that day.
            const todayStr = new Date().toISOString().split('T')[0];
            slider.value = (dateStr === todayStr) ? Math.floor(Date.now() / 1000) : slider.max;
            
            scrubWayback(); 
        }

        window.scrubWayback = function() {
            if (!isWaybackMode) return;
            const sliderVal = parseInt(document.getElementById('wayback-slider').value);
            waybackTargetTime = sliderVal; 

            const targetDate = new Date(waybackTargetTime * 1000);
            document.getElementById('wayback-time-display').innerText = targetDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

            drawWaybackMap();
            renderSidebar();
        };

        window.goLive = function() {
            isWaybackMode = false;
            
            const liveBtn = document.getElementById('wayback-live-btn');
            liveBtn.classList.add('active');
            liveBtn.innerText = "🔴 LIVE";
            
            const modeInd = document.getElementById('map-mode-indicator');
            modeInd.innerText = "LIVE";
            modeInd.style.color = "#28a745";
            document.getElementById('wayback-time-display').innerText = "LIVE";

            // Restore Live Sidebar Dropdown
            document.getElementById('sidebar-view').innerHTML = `
                <option value="live">📍 Live Map Trains</option>
                <option value="active">🚀 Active (>1km/h)</option>
                <option value="all">📡 All Known Trains</option>
            `;
            currentSidebarView = 'live';
            
            // Clear map and redraw live
            for (let id in trainMarkers) {
                map.removeLayer(trainMarkers[id]);
                delete trainMarkers[id];
            }
            if (latestLiveData.length > 0) {
                latestLiveData.forEach(train => updateMapMarker(train, 'live', 0));
            }
            renderSidebar();
        };

        function drawWaybackMap() {
            // Clear old markers first so ghosts from other days disappear
            for (let id in trainMarkers) {
                map.removeLayer(trainMarkers[id]);
                delete trainMarkers[id];
            }

            Object.values(currentArchiveData).forEach(t => {
                if (!t.path_history || t.path_history.length === 0) return;

                let histPoint = null;
                const history = t.path_history;

                if (waybackTargetTime <= history[0].t) {
                    // Time is before the first record -> Don't draw
                    return; 
                } else if (waybackTargetTime >= history[history.length - 1].t) {
                    histPoint = history[history.length - 1]; // Draw last known state
                } else {
                    for (let i = 0; i < history.length - 1; i++) {
                        if (waybackTargetTime >= history[i].t && waybackTargetTime <= history[i+1].t) {
                            histPoint = history[i];
                            break;
                        }
                    }
                }

                if (histPoint && t.raw_data) {
                    const fakeData = Object.assign({}, t.raw_data);
                    fakeData.lat = histPoint.lat;
                    fakeData.lng = histPoint.lng;
                    fakeData.speed = histPoint.s;
                    fakeData.course = histPoint.h;

                    const ageInPast = Math.max(0, waybackTargetTime - histPoint.t);
                    
                    // If the signal was lost for more than 5 minutes at this point in history, make it a ghost
                    if (ageInPast > 300) updateMapMarker(fakeData, 'ghost', ageInPast);
                    else updateMapMarker(fakeData, 'wayback', 0);
                }
            });
        }

        // ==========================================
        // UNIFIED MAP RENDERER
        // ==========================================
        function updateMapMarker(trainData, mode, lastSeenSec) {
            const trainId = trainData._id || trainData.id;
            const lat = trainData.lat;
            const lng = trainData.lng;
            if (!lat || !lng) return;

            const trainNum = trainData.trainNumber || 'Unknown';
            const heading = trainData.course || 0;
            const speedText = parseFloat(trainData.speed || 0).toFixed(1) + ' km/h';
            const nextStop = trainData.next_stop || trainData.nextStation || trainData.nextStopName || trainData.destination || 'Not available';
            const headingText = trainData.course ? Math.round(trainData.course) + '°' : 'N/A';

            let markerColor = '#d9534f'; 
            let statusText = `<span style="color:#28a745;font-weight:bold;">🟢 Live Streaming</span>`;
            
            if (mode === 'wayback') {
                markerColor = '#ff9800'; 
                statusText = `<span style="color:#ff9800;font-weight:bold;">🕒 DVR Target Time</span>`;
            } else if (mode === 'ghost') {
                markerColor = '#777777'; 
                statusText = `<span style="color:#d9534f;font-weight:bold;">📡 Last seen ${formatTimeAgo(lastSeenSec)}</span>`;
            }

            let innerContentHtml = `
                <div style="font-size:16px; margin-bottom: 5px; color:${markerColor};"><b>🚂 Train ${trainNum}</b></div>
                <div style="margin-bottom: 8px;">${statusText}</div>
                <table class="train-stats">
                    <tr><td><b>ID:</b></td><td>${trainId}</td></tr>
                    <tr><td><b>Speed:</b></td><td>${speedText}</td></tr>
                    <tr><td><b>Heading:</b></td><td>${headingText}</td></tr>
                    <tr><td><b>Next Stop:</b></td><td>${nextStop}</td></tr>
                </table>
                <button id="cam-btn-${trainId}" class="cam-btn" style="background-color:${markerColor};" onclick="openDashcam('${trainId}', '${trainNum}')">🎥 Live Dashcam</button>
                <div class="details-box"><b>All Details:</b><br>
            `;
            for (const [key, value] of Object.entries(trainData)) {
                if(key !== "path_history") { 
                    const valStr = typeof value === 'object' ? JSON.stringify(value) : value;
                    innerContentHtml += `<b>${key}:</b> ${valStr}<br>`;
                }
            }
            innerContentHtml += `</div>`;

            if (trainMarkers[trainId]) {
                const marker = trainMarkers[trainId];
                marker.setLatLng([lat, lng]);

                const iconElement = marker.getElement();
                if (iconElement) {
                    const arrow = iconElement.querySelector('.train-arrow');
                    if (arrow) {
                        arrow.style.transform = `rotate(${heading}deg)`;
                        arrow.style.backgroundColor = markerColor; 
                    }
                }

                const popup = marker.getPopup();
                if (popup && popup.isOpen()) {
                    const contentDiv = document.getElementById(`train-data-${trainId}`);
                    if (contentDiv) contentDiv.innerHTML = innerContentHtml;
                } else {
                    marker.setPopupContent(`<div class="info-popup" id="train-data-${trainId}">${innerContentHtml}</div>`);
                }
            } else {
                const trainIcon = L.divIcon({
                    className: 'train-icon-container',
                    html: `<div class="train-arrow" style="transform: rotate(${heading}deg); background-color: ${markerColor};">▲</div>`,
                    iconSize: [30, 30], iconAnchor: [15, 15]
                });
                const marker = L.marker([lat, lng], { icon: trainIcon }).addTo(map);
                marker.bindPopup(`<div class="info-popup" id="train-data-${trainId}">${innerContentHtml}</div>`, { maxHeight: 380, minWidth: 250 });
                trainMarkers[trainId] = marker;
            }
        }

        // ==========================================
        // UNIFIED SIDEBAR LOGIC
        // ==========================================
        let latestLiveData = [];
        let latestTrackerData = [];

        window.changeSidebarView = function(view) { currentSidebarView = view; renderSidebar(); };

        function renderSidebar() {
            const listEl = document.getElementById('train-list');
            const countEl = document.getElementById('sidebar-count');
            const listScroll = listEl.scrollTop;
            let html = '';
            let count = 0;

            if (currentSidebarView === 'live') {
                const sorted = latestLiveData.slice().sort((a, b) => (a.trainNumber || '').localeCompare(b.trainNumber || ''));
                count = sorted.length;
                sorted.forEach(train => {
                    const tid = train._id || train.id;
                    const num = train.trainNumber || 'Unknown';
                    const speed = parseFloat(train.speed || 0).toFixed(1);
                    const dot = speed > 1.0 ? '🟢' : '🟡';
                    html += `<div class="train-item" onclick="focusTrain('${tid}')"><span class="train-item-title">${dot} Train ${num}</span><span class="train-item-meta"><b>Speed:</b> ${speed} km/h</span></div>`;
                });
            } else if (currentSidebarView === 'all') {
                const all = latestTrackerData.slice().sort((a,b) => a.last_seen_sec - b.last_seen_sec);
                count = all.length;
                all.forEach(t => {
                    const timeClass = t.last_seen_sec > 30 ? 'dead-badge' : 'live-badge';
                    html += `<div class="train-item" onclick="focusTrain('${t.id}')"><span class="train-item-title">📡 Train ${t.number} <span class="${timeClass}">${formatTimeAgo(t.last_seen_sec)}</span></span></div>`;
                });
            } else if (currentSidebarView === 'active') {
                const active = latestTrackerData.filter(t => t.current_speed > 1.0 && t.last_seen_sec < 600).sort((a,b) => b.max_speed - a.max_speed);
                count = active.length;
                active.forEach(t => {
                    html += `<div class="train-item" onclick="focusTrain('${t.id}')"><span class="train-item-title">🚀 Train ${t.number} <span class="speed-badge green">${t.current_speed.toFixed(1)} km/h</span></span></div>`;
                });
            } else if (currentSidebarView === 'dvr-all' && isWaybackMode) {
                const allDvr = Object.values(currentArchiveData);
                count = allDvr.length;
                allDvr.forEach(t => {
                    html += `<div class="train-item" onclick="focusTrain('${t.raw_data.id || t.raw_data._id}')"><span class="train-item-title">📡 Train ${t.number}</span><span class="train-item-meta">In Dataset</span></div>`;
                });
            } else if (currentSidebarView === 'dvr-active' && isWaybackMode) {
                // Find trains moving at exactly the wayback timestamp
                let activeCount = 0;
                Object.values(currentArchiveData).forEach(t => {
                    if (!t.path_history) return;
                    let speedAtTime = 0;
                    for (let i = 0; i < t.path_history.length - 1; i++) {
                        if (waybackTargetTime >= t.path_history[i].t && waybackTargetTime <= t.path_history[i+1].t) {
                            speedAtTime = t.path_history[i].s; break;
                        }
                    }
                    if (speedAtTime > 1.0) {
                        activeCount++;
                        html += `<div class="train-item" onclick="focusTrain('${t.raw_data.id || t.raw_data._id}')"><span class="train-item-title">🚀 Train ${t.number} <span class="speed-badge green">${speedAtTime.toFixed(1)} km/h</span></span></div>`;
                    }
                });
                count = activeCount;
            }

            countEl.innerText = count;
            if (count === 0) listEl.innerHTML = `<div style="padding:15px;color:var(--text-muted);text-align:center;">No trains found.</div>`;
            else { listEl.innerHTML = html; requestAnimationFrame(() => listEl.scrollTop = listScroll); }
        }

        // Lightweight Live Poller
        function fetchTrackerData() {
            if (isWaybackMode) return; // Don't poll DB if watching DVR
fetch('/api/tracker')
    .then(r => r.json())
    .then(data => {
        latestTrackerData = data; // Save to RAM
        renderSidebar();          // Populate the list instantly
        // Draw "Ghost" markers so the map isn't empty
        data.forEach(t => updateMapMarker(t.raw_data || t, 'ghost', t.last_seen_sec));
    });
                }).catch(err => console.log("Tracker API offline."));
        }
        setInterval(fetchTrackerData, 3000);
        fetchTrackerData();

        // LIVE TRAIN SSE STREAM
        const source = new EventSource('/train-stream');
        
        source.addEventListener('trainPositionsUx', (event) => {
            if (isWaybackMode) return; // Ignore live stream while in DVR
            try {
                const parsedData = JSON.parse(event.data);
                latestLiveData = parsedData.positions || [];
                if (currentSidebarView === 'live') renderSidebar();
                latestLiveData.forEach(train => { updateMapMarker(train, 'live', 0); });
            } catch (err) {} 
        });

        source.addEventListener('server_stats', (event) => {
            document.getElementById('mps-counter').innerText = event.data;
            document.getElementById('stream-status').innerText = '🟢 Live';
        });

        window.openDashcam = function(id, num) { if(isWaybackMode) alert("Dashcam feed unavailable in DVR mode."); else alert("Dashcam offline"); }
        window.closeDashcam = function() { document.getElementById('video-modal').style.display = 'none'; };
        
        fetch('/geo').then(r=>r.json()).then(j=>{if(j&&j.data)L.geoJSON(j.data,{pointToLayer:(f,ll)=>L.circleMarker(ll,{pane:'stationsPane',radius:10,fillColor:"#ff7800",color:"#000",weight:2,opacity:1,fillOpacity:1})}).addTo(map);});
    </script>
</body>
